<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>子公司料件紀錄</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --paper:#EEF1EA;
    --surface:#FFFFFF;
    --ink:#1B2A3A;
    --ink-soft:#5B6B72;
    --seal:#B23A2E;
    --jade:#2F6F5E;
    --gold:#9C7A33;
    --line:#DADCD2;
    --danger:#B23A2E;
    --radius:10px;
    --shadow:0 1px 2px rgba(27,42,58,.06), 0 6px 16px rgba(27,42,58,.06);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    background-image:
      linear-gradient(rgba(27,42,58,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(27,42,58,.035) 1px, transparent 1px);
    background-size:28px 28px;
    color:var(--ink);
    font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2{ font-family:'Noto Serif TC','Noto Sans TC',serif; margin:0; }
  button{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  .page{ max-width:880px; margin:0 auto; padding:28px 20px 60px; }
  [hidden]{ display:none !important; }

  /* ---------- masthead ---------- */
  .masthead{ display:flex; align-items:center; margin-bottom:26px; }
  .title-block h1{ font-size:26px; color:var(--ink); }

  /* ---------- cards ---------- */
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:18px 20px; margin-bottom:18px;
  }
  .card h2{ font-size:16px; margin-bottom:14px; }
  .card-header-row{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
  .card-header-row h2{ margin:0; }
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; }

  /* ---------- login ---------- */
  #loginScreen{ max-width:380px; margin:0 auto; }
  #loginForm{ display:flex; flex-direction:column; gap:14px; }
  .login-error{ color:var(--seal); font-size:13px; margin:4px 0 0; }

  /* ---------- form ---------- */
  #monthForm{ display:flex; flex-wrap:wrap; gap:14px; align-items:end; }
  .field{ display:flex; flex-direction:column; gap:5px; }
  .field label{ font-size:12px; color:var(--ink-soft); }
  .field input{
    border:1px solid var(--line); border-radius:7px; padding:8px 10px; font-size:14px;
    background:var(--surface); color:var(--ink); font-family:inherit;
  }
  .field input[type=number]{ font-family:'IBM Plex Mono',monospace; width:170px; }
  .field input[type=month]{ width:140px; }
  .field input[type=email], .field input[type=password]{ width:100%; }

  .btn{
    border:1px solid var(--ink); background:var(--ink); color:#fff; border-radius:7px;
    padding:9px 16px; font-size:14px; font-weight:500; cursor:pointer; transition:transform .12s ease, opacity .12s ease;
  }
  .btn:hover{ transform:translateY(-1px); opacity:.92; }
  .btn:active{ transform:translateY(0); }
  .btn:disabled{ opacity:.4; cursor:default; transform:none; }
  .btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn-small{ padding:6px 11px; font-size:12.5px; border-radius:6px; }
  @media (prefers-reduced-motion:reduce){ .btn{ transition:none; } }

  .btn-link{
    background:none; border:none; color:var(--seal); text-decoration:underline; cursor:pointer;
    font-size:inherit; padding:0;
  }

  .user-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:10px; flex-wrap:wrap; }
  .user-row .who{ color:var(--ink-soft); font-size:13px; }

  /* ---------- filter ---------- */
  .filter-row{ display:flex; gap:10px; align-items:end; flex-wrap:wrap; }
  .filter-row .field input{ width:130px; }

  /* ---------- table ---------- */
  .table-wrap{ overflow-x:auto; }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; min-width:520px; }
  thead th{
    text-align:right; font-weight:600; color:var(--ink-soft); font-size:12px;
    border-bottom:2px solid var(--ink); padding:8px 10px; white-space:nowrap;
  }
  thead th:first-child{ text-align:left; }
  thead th.factory-col{ text-align:left; }
  tbody td{ border-bottom:1px solid var(--line); padding:8px 10px; text-align:right; white-space:nowrap; }
  tbody td:first-child{ text-align:left; }
  tbody td.factory-col{ text-align:left; }
  td.num, th.num{ font-family:'IBM Plex Mono',monospace; font-variant-numeric:tabular-nums; }
  tbody tr:hover{ background:rgba(27,42,58,.025); }
  tfoot td{ border-top:2px solid var(--ink); font-weight:600; padding:10px 10px; text-align:right; }
  tfoot td:first-child{ text-align:left; }
  .del-btn{ background:none; border:none; color:var(--seal); cursor:pointer; font-size:12.5px; padding:2px 4px; }
  .del-btn:hover{ text-decoration:underline; }
  .empty-row td{ text-align:center; color:var(--ink-soft); padding:22px 0; }

  .pagination-row{ display:flex; align-items:center; justify-content:center; gap:16px; margin-top:14px; font-size:13px; color:var(--ink-soft); }

  /* ---------- summary cards ---------- */
  .summary-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .stat-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:16px 18px;
  }
  .stat-card .label{ font-size:12px; color:var(--ink-soft); letter-spacing:.04em; }
  .stat-card .value{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:20px; margin-top:6px;
    font-variant-numeric:tabular-nums;
  }
  .stat-card.s .value{ color:var(--jade); }
  .stat-card.t .value{ color:var(--seal); }

  .foot-note{ text-align:center; color:var(--ink-soft); font-size:12.5px; margin-top:22px; }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(8px);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:8px; font-size:13.5px;
    opacity:0; transition:opacity .2s ease, transform .2s ease; pointer-events:none; z-index:50;
    max-width:90vw; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .setup-warning{
    background:#FBEFE9; border:1px solid var(--seal); border-radius:var(--radius);
    padding:16px 18px; font-size:13.5px; color:var(--ink); margin-bottom:18px;
  }

  @media (max-width:600px){
    .summary-row{ grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <div class="title-block">
      <h1>子公司料件紀錄</h1>
    </div>
  </header>

  <div id="setupWarning" class="setup-warning" hidden>

        <div style="position:relative;">
          <input type="password" id="passwordInput" autocomplete="current-password" required style="width:100%;padding-right:40px;">
  
        </div>
      </div>

<div id="monkey-toggle" style="display:flex;flex-direction:column;align-items:center;margin-top:8px;">

        <circle cx="19" cy="17" r="4" fill="#c8853a"/>

      </g>
    </svg>
  </button>
  <div id="mk-label" style="font-size:11px;color:#64748b;margin-top:2px;">點我顯示密碼</div>
</div>
<script>
var _mkShowing=false;
function toggleMonkey(){
  _mkShowing=!_mkShowing;
  var pwInputs=document.querySelectorAll('input[type=password],input[type=text][id*="pw"],input[type=text][id*="password"],input[type=text][id*="passwordInput"]');
  pwInputs.forEach(function(el){if(el.id==='passwordInput'||el.id==='pw'||el.id==='passwordInput')el.type=_mkShowing?'text':'password';});
  document.getElementById('mk-hands').style.display=_mkShowing?'none':'';
  document.getElementById('mk-eyes').style.display=_mkShowing?'':'none';
  document.getElementById('mk-banana').style.display=_mkShowing?'':'none';
  document.getElementById('mk-mouth-s').style.display=_mkShowing?'':'none';
  document.getElementById('mk-mouth-n').style.display=_mkShowing?'none':'';
  document.getElementById('mk-label').textContent=_mkShowing?'點我隱藏密碼':'點我顯示密碼';
}
</script>
      <button type="submit" class="btn" id="loginBtn">登入</button>
      <p class="login-error" id="loginError" hidden></p>
    </form>
  </section>

  <div id="appScreen" hidden>

    <div class="user-row">
      <span class="who" id="userInfo"></span>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="btn-link" onclick="openChangePw()" type="button">修改密碼</button>
        <button class="btn-link" id="logoutBtn" type="button">登出</button>
      </div>
    </div>

    <!-- 修改密碼 Modal -->
    <div id="changePwModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;padding:1rem;">
      <div style="background:#fff;border-radius:16px;padding:28px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3);">
        <h2 style="margin-bottom:18px;font-size:16px;">🔑 修改密碼</h2>
        <div class="field" style="margin-bottom:12px;">
          <label>新密碼</label>
          <div style="position:relative;">
            <input type="password" id="newPwInput" placeholder="輸入新密碼" style="width:100%;padding-right:40px;">
            <button type="button" onclick="togglePw('newPwInput','eyeIcon2')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#5B6B72;font-size:16px;" id="eyeIcon2">👁</button>
          </div>
        </div>
        <div class="field" style="margin-bottom:20px;">
          <label>確認新密碼</label>
          <div style="position:relative;">
            <input type="password" id="confirmPwInput" placeholder="再次輸入新密碼" style="width:100%;padding-right:40px;">
            <button type="button" onclick="togglePw('confirmPwInput','eyeIcon3')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#5B6B72;font-size:16px;" id="eyeIcon3">👁</button>
          </div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn btn-ghost btn-small" onclick="closeChangePw()">取消</button>
          <button class="btn btn-small" onclick="doChangePw()" id="changePwBtn">💾 儲存</button>
        </div>
      </div>
    </div>

    <!-- 上方:看板總覽 + 月份區間篩選 -->
    <section class="card" id="dashboardCard">
      <div class="card-header-row">
        <h2>累計總覽</h2>
        <div class="filter-row">
          <div class="field">
            <label for="filterStart">起始月份</label>
            <input type="month" id="filterStart">
          </div>
          <div class="field">
            <label for="filterEnd">結束月份</label>
            <input type="month" id="filterEnd">
          </div>
          <button class="btn btn-ghost btn-small" id="clearFilterBtn" type="button">清除篩選</button>
        </div>
      </div>
      <div class="summary-row" id="summaryCards" aria-label="累計總覽"></div>
    </section>

    <!-- 中間:本月輸入 -->
    <section class="card" id="addMonthCard">
      <h2>新增本月記錄</h2>
      <form id="monthForm">
        <div class="field">
          <label for="monthInput">月份</label>
          <input type="month" id="monthInput" required>
        </div>
        <div class="field">
          <label for="nanjingInput">南京付款金額(RMB)</label>
          <input type="number" id="nanjingInput" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="field">
          <label for="lianshuiInput">漣水付款金額(RMB)</label>
          <input type="number" id="lianshuiInput" step="0.01" min="0" placeholder="0.00">
        </div>
        <button type="submit" class="btn" id="addMonthBtn">新增本月記錄</button>
      </form>
    </section>

    <!-- 下方:記錄總表(分頁) -->
    <section class="card" id="ledgerCard">
      <div class="card-header-row">
        <h2>記錄總表</h2>
        <div class="toolbar">
          <button class="btn btn-ghost btn-small" id="refreshBtn" type="button">重新整理</button>
          <button class="btn btn-ghost btn-small" id="exportExcelBtn" type="button">匯出Excel</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="ledgerTable">
          <thead>
            <tr>
              <th>匯款日期</th>
              <th class="num">金額(RMB)</th>
              <th class="num">S</th>
              <th class="num">T</th>
              <th class="factory-col">廠別</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="ledgerBody"></tbody>
          <tfoot id="ledgerFoot"></tfoot>
        </table>
      </div>
      <div class="pagination-row" id="paginationRow">
        <button class="btn btn-ghost btn-small" id="prevPageBtn" type="button">← 上一頁</button>
        <span id="pageIndicator">第 1 頁 / 共 1 頁</span>
        <button class="btn btn-ghost btn-small" id="nextPageBtn" type="button">下一頁 →</button>
      </div>
    </section>

    <p class="foot-note">
      資料即時存在你自己的 Supabase 雲端資料庫,手機、電腦登入同一個帳號,看到的會是同一份資料。
      <br>
      <button class="btn-link" id="clearAllBtn" type="button">清空所有資料</button>
    </p>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  "use strict";

  // ============================================================
  // 請把下面兩個值換成你自己 Supabase 專案的設定
  // Supabase 後台 → Settings → API → Project URL / anon public key
  // ============================================================

  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2dXlneWFqenVwZXFwcWZ3bWdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjA5MjQsImV4cCI6MjA5NzczNjkyNH0.zvP-JWgHRWiCKZbqSSU6-uGgx3WHwG0nFxfG8xDhEH8";
  // ============================================================

  var ADMIN_EMAIL = "michellechang154@gmail.com";
  var FACTORIES = ["南京","漣水"];
  var TABLE = "material_records";
  var PAGE_SIZE = 10;

  if(SUPABASE_URL.indexOf("YOUR-PROJECT")!==-1 || SUPABASE_ANON_KEY.indexOf("YOUR-ANON")!==-1){
    document.getElementById("setupWarning").removeAttribute("hidden");

  }

  function applyRoleUI(){
    // 新增表單區塊整個顯示/隱藏
    var addCard = document.getElementById("addMonthCard");
    if(addCard) addCard.style.display = isAdmin ? "" : "none";
    // 清空按鈕
    var clearBtn = document.getElementById("clearAllBtn");
    if(clearBtn) clearBtn.style.display = isAdmin ? "" : "none";
  }

  function fmt(n, decimals){
    decimals = decimals===undefined ? 0 : decimals;
    var num = Number(n);
    if(!isFinite(num)) num = 0;
    return num.toLocaleString("zh-TW", {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
  }
  function fmtDateZh(iso){
    if(!iso) return "";
    var p = iso.split("-");
    if(p.length!==3) return iso;
    return p[0]+"年"+parseInt(p[1],10)+"月"+parseInt(p[2].slice(0,2),10)+"日";
  }
  function currentMonthValue(){
    var d = new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
  }
  function nextMonthValue(monthStr){
    var parts = monthStr.split("-");
    var y = parseInt(parts[0],10), m = parseInt(parts[1],10);
    m += 1;
    if(m>12){ m=1; y+=1; }
    return y+"-"+String(m).padStart(2,"0");
  }
  function defaultMonthValue(){
    if(records.length===0) return currentMonthValue();
    var maxDate = records.reduce(function(max,r){ return r.pay_date>max ? r.pay_date : max; }, "0000-00-00");
    return nextMonthValue(maxDate.slice(0,7));
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];
    });
  }

  var toastTimer = null;
  function showToast(msg){
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove("show"); }, 2600);
  }

  // ---------- DOM refs ----------
  var loginScreen = document.getElementById("loginScreen");
  var appScreen = document.getElementById("appScreen");
  var loginForm = document.getElementById("loginForm");
  var emailInput = document.getElementById("emailInput");
  var passwordInput = document.getElementById("passwordInput");

  function showLoginScreen(){

    appScreen.setAttribute("hidden","");
  }
  function showAppScreen(user){
    loginScreen.setAttribute("hidden","");
    appScreen.removeAttribute("hidden");
    userInfo.textContent = "登入身分:"+user.email;
  }

  // ---------- filtering ----------
  function getFilteredRecords(){
    var fs = filterStart.value;
    var fe = filterEnd.value;
    return records.filter(function(r){
      var ym = r.pay_date.slice(0,7);
      if(fs && ym<fs) return false;
      if(fe && ym>fe) return false;
      return true;
    }).sort(function(a,b){
      if(a.pay_date!==b.pay_date) return a.pay_date<b.pay_date ? -1 : 1;
      return FACTORIES.indexOf(a.factory) - FACTORIES.indexOf(b.factory);
    });
  }

  // ---------- render ----------
  function renderSummaryCards(){
    var filtered = getFilteredRecords();
    var nanjingTotal=0, lianshuiTotal=0, totalS=0, totalT=0;
    filtered.forEach(function(r){
      if(r.factory===FACTORIES[0]) nanjingTotal += Number(r.amount)||0;
      else if(r.factory===FACTORIES[1]) lianshuiTotal += Number(r.amount)||0;
      totalS += Number(r.s_amount)||0;
      totalT += Number(r.t_amount)||0;
    });
    var cards = [
      {label:"南京付款累計(RMB)", value: fmt(nanjingTotal), cls:""},
      {label:"漣水付款累計(RMB)", value: fmt(lianshuiTotal), cls:""},
      {label:"S 累計(RMB)", value: fmt(totalS), cls:"s"},
      {label:"T 累計(RMB)", value: fmt(totalT), cls:"t"}
    ];
    var wrap = document.getElementById("summaryCards");
    wrap.innerHTML = cards.map(function(c){
      return '<div class="stat-card '+c.cls+'"><div class="label">'+c.label+'</div><div class="value">'+c.value+'</div></div>';
    }).join("");
  }

  function renderPaginationControls(page, totalPages){
    document.getElementById("pageIndicator").textContent = "第 "+page+" 頁 / 共 "+totalPages+" 頁";
    document.getElementById("prevPageBtn").disabled = page<=1;
    document.getElementById("nextPageBtn").disabled = page>=totalPages;
  }

  function renderLedgerTable(){
    var body = document.getElementById("ledgerBody");
    var foot = document.getElementById("ledgerFoot");
    var filtered = getFilteredRecords();

    var totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    if(currentPage>totalPages) currentPage = totalPages;
    if(currentPage<1) currentPage = 1;

    if(filtered.length===0){
      var msg = records.length===0 ? "還沒有任何記錄,先在上面新增第一個月吧。" : "篩選區間內沒有符合的記錄。";
      body.innerHTML = '<tr class="empty-row"><td colspan="6">'+msg+'</td></tr>';
      foot.innerHTML = "";
      renderPaginationControls(1,1);
      return;
    }

    var startIdx = (currentPage-1)*PAGE_SIZE;
    var pageItems = filtered.slice(startIdx, startIdx+PAGE_SIZE);

    body.innerHTML = pageItems.map(function(r){
      var amt = Number(r.amount)||0, sA = Number(r.s_amount)||0, tA = Number(r.t_amount)||0;
      return "<tr>"+
        "<td>"+fmtDateZh(r.pay_date)+"</td>"+
        "<td class=\"num\">"+fmt(amt)+"</td>"+
        "<td class=\"num\">"+fmt(sA)+"</td>"+
        "<td class=\"num\">"+fmt(tA)+"</td>"+
        "<td class=\"factory-col\">"+escapeHtml(r.factory)+"</td>"+
        "<td>"+(isAdmin ? "<button class=\"del-btn\" data-id=\""+r.id+"\">刪除</button>" : "")+"</td>"+
        "</tr>";
    }).join("");

    var totalAmount=0,totalS=0,totalT=0;
    filtered.forEach(function(r){
      totalAmount += Number(r.amount)||0;
      totalS += Number(r.s_amount)||0;
      totalT += Number(r.t_amount)||0;
    });
    foot.innerHTML = "<tr>"+
      "<td>合計(共"+filtered.length+"筆)</td>"+
      "<td class=\"num\">"+fmt(totalAmount)+"</td>"+
      "<td class=\"num\">"+fmt(totalS)+"</td>"+
      "<td class=\"num\">"+fmt(totalT)+"</td>"+
      "<td></td><td></td>"+
      "</tr>";

    Array.prototype.forEach.call(body.querySelectorAll(".del-btn"), function(btn){
      btn.addEventListener("click", function(){ onDeleteClick(btn.getAttribute("data-id")); });
    });

    renderPaginationControls(currentPage, totalPages);
  }

  function renderAll(){
    renderSummaryCards();
    renderLedgerTable();
  }

  // ---------- data ----------
  async function loadRecords(opts){
    opts = opts || {};
    var { data, error } = await sb.from(TABLE).select("*").order("pay_date", {ascending:true});
    if(error){ showToast("讀取資料失敗:"+error.message); return; }
    records = data || [];
    if(opts.jumpToLastPage){ currentPage = Number.MAX_SAFE_INTEGER; }
    renderAll();
    monthInput.value = defaultMonthValue();
  }

  async function onDeleteClick(id){
    var rec = records.find(function(r){ return r.id===id; });
    if(!rec) return;
    if(!confirm("刪除 "+fmtDateZh(rec.pay_date)+" "+rec.factory+" 這筆金額 "+fmt(rec.amount)+" 的記錄嗎?")) return;
    var { error } = await sb.from(TABLE).delete().eq("id", id);
    if(error){ showToast("刪除失敗:"+error.message); return; }
    showToast("已刪除一筆記錄");
    await loadRecords();
  }

  monthForm.addEventListener("submit", async function(e){
    e.preventDefault();
    var monthVal = monthInput.value;
    if(!monthVal){ showToast("請選擇月份"); return; }
    var date = monthVal+"-25";
    var nRaw = nanjingInput.value.trim();
    var lRaw = lianshuiInput.value.trim();
    if(nRaw==="" && lRaw===""){ showToast("請至少輸入一個工廠的金額"); return; }

    var rows = [];
    if(nRaw!==""){
      var nAmt = parseFloat(nRaw);
      if(isNaN(nAmt) || nAmt<0){ showToast("南京付款金額不正確"); return; }
      rows.push({ pay_date:date, factory:FACTORIES[0], amount:nAmt });
    }
    if(lRaw!==""){
      var lAmt = parseFloat(lRaw);
      if(isNaN(lAmt) || lAmt<0){ showToast("漣水付款金額不正確"); return; }
      rows.push({ pay_date:date, factory:FACTORIES[1], amount:lAmt });
    }

    addMonthBtn.disabled = true;
    var { error } = await sb.from(TABLE).insert(rows);
    addMonthBtn.disabled = false;
    if(error){ showToast("新增失敗:"+error.message); return; }

    nanjingInput.value = "";
    lianshuiInput.value = "";
    showToast("已新增 "+monthVal+" 的記錄");
    await loadRecords({ jumpToLastPage:true });
  });

  // ---------- filter events ----------
  filterStart.addEventListener("change", function(){ currentPage=1; renderAll(); });
  filterEnd.addEventListener("change", function(){ currentPage=1; renderAll(); });
  document.getElementById("clearFilterBtn").addEventListener("click", function(){
    filterStart.value = ""; filterEnd.value = "";
    currentPage = 1;
    renderAll();
  });

  // ---------- pagination events ----------
  document.getElementById("prevPageBtn").addEventListener("click", function(){
    if(currentPage>1){ currentPage--; renderLedgerTable(); }
  });
  document.getElementById("nextPageBtn").addEventListener("click", function(){
    currentPage++; renderLedgerTable();
  });

  document.getElementById("refreshBtn").addEventListener("click", function(){
    loadRecords();
    showToast("已重新整理");
  });

  document.getElementById("clearAllBtn").addEventListener("click", async function(){
    if(!confirm("確定要清空所有記錄嗎?此動作無法復原。")) return;
    var { error } = await sb.from(TABLE).delete().gte("id","00000000-0000-0000-0000-000000000000");
    if(error){ showToast("清空失敗:"+error.message); return; }
    showToast("已清空所有資料");
    currentPage = 1;
    await loadRecords();
  });

  // ---------- export excel ----------
  document.getElementById("exportExcelBtn").addEventListener("click", function(){
    var filtered = getFilteredRecords();
    var rows = filtered.map(function(r){
      return {
        "日期": fmtDateZh(r.pay_date),
        "廠別": r.factory,
        "付款金額": Number(r.amount)||0,
        "S": Number(r.s_amount)||0,
        "T": Number(r.t_amount)||0
      };
    });
    var totalAmount=0,totalS=0,totalT=0;
    filtered.forEach(function(r){
      totalAmount += Number(r.amount)||0;
      totalS += Number(r.s_amount)||0;
      totalT += Number(r.t_amount)||0;
    });
    rows.push({ "日期":"合計", "廠別":"", "付款金額":totalAmount, "S":totalS, "T":totalT });

    var ws = XLSX.utils.json_to_sheet(rows);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "紀錄");
    var d = new Date();
    var stamp = d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
    XLSX.writeFile(wb, "子公司料件紀錄_"+stamp+".xlsx");
    showToast("已匯出Excel");
  });

  // ---------- auth ----------
  loginForm.addEventListener("submit", async function(e){
    e.preventDefault();
    loginError.setAttribute("hidden","");
    loginBtn.disabled = true;
    var { error } = await sb.auth.signInWithPassword({
      email: emailInput.value.trim(),
      password: passwordInput.value
    });
    loginBtn.disabled = false;
    if(error){
      loginError.textContent = "登入失敗,請確認帳號密碼是否正確";
      loginError.removeAttribute("hidden");
      return;
    }
    passwordInput.value = "";
  });

  document.getElementById("logoutBtn").addEventListener("click", async function(){
    await sb.auth.signOut();
  });

  sb.auth.onAuthStateChange(function(event, session){
    if(session && session.user){
      currentUser = session.user;
      isAdmin = currentUser.email === ADMIN_EMAIL;
      showAppScreen(currentUser);
      applyRoleUI();
      loadRecords({ jumpToLastPage:true });
    } else {
      currentUser = null;
      isAdmin = false;
      showLoginScreen();
    }
  });

  // 切回分頁時順手刷新一次,讓多裝置之間的資料看起來是同步的
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState==="visible" && currentUser){ loadRecords(); }
  });

})();

// 眼睛圖示切換
function togglePw(inputId, btnId){
  var input = document.getElementById(inputId);
  var btn = document.getElementById(btnId);
  if(input.type === 'password'){
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}
